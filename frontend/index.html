<!DOCTYPE html>
<html>
<!-- Verbinden von CSS, JS und HTML  --> 

<!-- Enthält Informationen über die Webseite, die nicht direkt sichtbar sind  --> 
 <!-- Mögliche Inhalte:
        -Titel der Webseite
        -CSS-Dateien
        -Informationen für Suchmaschinen
        -Schriftarten  
--> 
<head>
    <!-- CSS einbinden // rel bedeutet Relationship // Welche Beziehung die verlinkte Datei zur HTML-Seite hat // href ist der Pfad/die Adresse der Datei --> 
    <link rel="stylesheet" href="../static/css/style.css">
</head>

<!-- Alles was der Benutzer tatsächlich sieht --> 
<body>
    <!-- Überschrift 1 --> 
    <h1>Ticketverwaltung</h1>
    
    <!-- ul = untergeordnete Liste // li = Listeneintrag --> 
    <ul class="liste"> ++ TODO andere Liste + MUSS Variabel lang sein!
        <li>Ticket 1</li>
        <li>Ticket 2</li>
        <li>Ticket 3</li>
    </ul>

<!--
TODO: Darauf umbauen, wenn ich mit den ersten Tests durch bin
Hiermit kann ich auch mehrere Eigenschaften vom Ticket, z.B. Titel und Beschreibung anzeigen, mit UL nicht
(<table>) oder Karten (<div>/<article>)
 --> 

    <div class="container">
        <button class="uploadButton">Ticket hochladen</button>
        <button class="ticketsButton">Tickets anzeigen</button>
    </div>

    <!-- JS Datei laden // MUSS am Ende stehen, damit alle Button etc. schon vorhanden sind --> 
    <script src="../static/js/index.js"></script>
</body>
</html>


<!-- Tags:
<link> wird benutzt um Dateien einzubinden
    -z.B. eine CSS Datei 
    -Bsp.: <link rel="stylesheet" href="../static/css/style.css">

<script> wird benutzt um Scripte einzubinden
    -z.B. eine JavaScript Datei
    -Bsp.: <script src="../static/js/app.js"></script>

<input> 

<button> Erzeugt einen Button
    -Bsp.:<button>Upload</button>

<h> steht für Überschrift

ul = untergeordnete Liste 

li = Listeneintrag

<head> steht für den Kopfinhalt der HTML Datei
    -Mögliche Inhalte:
        ->Titel der Webseite
        ->CSS-Dateien
        ->Informationen für Suchmaschinen
        ->Schriftarten  

<body> steht für Körper der HTML Datei
    -Es ist alles was der Benutzer tatsächlich sieht 
    -Bsp.: Button

<p> steht für Paragraph (Absatz)
    -Ist ein Text-Element
    -<p>Das ist ein Text.</p>


<span> = Inline-Text
    -<span id="fehlermeldung"></span>
    -Eher für kleine Textteile
    -Bleibt in einer Zeile

<div> = Neutraler Container
    -<div id="fehlermeldung"></div>
    -Wird oft für Layout verwendet
    -Hat keine Bedeutung
-->
